<!doctype html>
<html lang="en">
<head>
  <script defer data-domain="junctajuvant.com" src="https://stats.4gk.us/js/script.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Juncta Juvant — Cincinnati News</title>

  <script>
    // Title sanitizer — strips leading bullets/asterisks that some scripts/extensions add
    (function(){
      const strip = () => { try{ document.title = document.title.replace(/^\s*[•*]+\s*/, ''); }catch(e){} };
      strip();
      // keep it clean if something mutates <title>
      const titleEl = document.querySelector('head > title');
      if (titleEl && window.MutationObserver) {
        const obs = new MutationObserver(strip);
        obs.observe(titleEl, { childList: true });
      }
      window.addEventListener('focus', strip); // another safe moment to sanitize
    }());
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=Newsreader:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#111;
      --ink-lite:#333;
      --paper:#f7f5f2; /* slight newsprint tint */
      --rule:#d8d1c7;
      --accent:#7a5e3a; /* sepia accent */
      --accent-ink:#3b2b18;
    }
    *{ box-sizing:border-box }
    html, body{ margin:0; padding:0; background:var(--paper); color:var(--ink); }
    body{
      font-family:"Newsreader", ui-serif, Georgia, "Times New Roman", Times, serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height:1.45;
    }
    a{ color:var(--ink); text-decoration-color: #b4a898; text-decoration-thickness: .06rem; }
    a:hover{ color:var(--accent-ink); text-decoration-color: var(--accent); }
    .wrap{ max-width:920px; margin:0 auto; padding:1.25rem; }
    header{ margin:1rem 0 1.25rem; }
    .nameplate{
      font-family:"Cinzel", ui-serif, Georgia, "Times New Roman", Times, serif;
      font-weight:900;
      letter-spacing:.04em;
      font-size: clamp(2.2rem, 4.4vw, 3.25rem);
      line-height: 1;
      text-transform: uppercase;
    }
    .dek{
      margin-top:.35rem;
      font-size: clamp(1.05rem, 2.2vw, 1.25rem);
      color:var(--ink-lite);
      letter-spacing:.02em;
    }
    .dateline{ 
      margin-top:.35rem; 
      font-variant: small-caps;
      letter-spacing:.08em; color:var(--ink-lite);
    }
    .rule{ height:1px; background:var(--rule); margin:1rem 0 1.25rem; }

    /* Keep the image inside the hero box and center its focal point */
    .hero{
      overflow: hidden; /* prevents any spill into adjacent columns */
      border:1px solid var(--rule);
      background:#fff;
      display:grid;
      grid-template-columns: 1fr;
      grid-gap:1rem;
      padding:1rem;
    }
    .hero img{ 
      width:100%; height:auto; display:block;
      object-fit:cover;
    }

    main{ display:grid; grid-template-columns: 1.4fr .8fr; gap: 2rem; }
    @media (max-width: 860px){
      main{ grid-template-columns: 1fr; }
    }

    h2{
      font-family:"Cinzel", ui-serif, Georgia, "Times New Roman", Times, serif;
      font-weight:800; letter-spacing:.04em;
      text-transform: uppercase;
      font-size: clamp(1.15rem, 2.4vw, 1.35rem);
      margin:0 0 .75rem;
    }
    .section{ margin-bottom:1.5rem; }
    .muted{ color:#6a645b; }

    /* News list */
    #news-list{ list-style:none; padding:0; margin:0; }
    #news-list li{ margin:.6rem 0 .9rem; }
    #news-list .source{ font-size:.92rem; color:#6a645b; }

    /* Weather block */
    .weather{ display:flex; gap:1rem; align-items:flex-start; }
    .weather .temp{ font-size:2rem; font-weight:700; }
    .weather .desc{ margin-top:.15rem; }
