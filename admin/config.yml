local_backend: true   # <- key line: no OAuth when working locally
# Use DecapBridge auth (required)
backend:
  name: git-gateway
  repo: gregorykorte/junctajuvant
  branch: main
  identity_url: https://auth.decapbridge.com/sites/1dcccfa0-9ecd-4aa0-af70-c84e60d6237b
  gateway_url: https://gateway.decapbridge.com

  # Quickly see who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Add site links in DecapCMS (optional)
site_url: https://junctajuvant.com

display_url: https://junctajuvant.com

logo_url: /favicon

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - label: "Pages"
    name: "pages"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    editor: { preview: false }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body",  name: "body",  widget: "markdown" }
  - label: "Overrides"
    name: "overrides"
    files:
      - label: "Site Overrides"
        name: "site"
        file: "data/overrides.json"
        editor: { preview: false }
        fields:
          - { label: "Pin Hero URL", name: "pin_hero_url", widget: "string", required: false }
          - { label: "Hide Sources (slugs)", name: "hide_sources", widget: "list", required: false }
          - { label: "Custom Tagline", name: "custom_tagline", widget: "string", required: false }
